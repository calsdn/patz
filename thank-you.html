    @font-face {
      font-family: 'Pretendard Variable';
      src: url('fonts/PretendardVariable.ttf') format('truetype');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #f9c6d5 0%, #fff 60%);
      padding: 60px 32px;
      text-align: center;
      font-family: 'Pretendard Variable', sans-serif;
      max-width: 480px;
      margin: 0 auto;
    }

    .logo {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #111;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      background: #111;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 6px 16px;
      border-radius: 99px;
      margin-bottom: 28px;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      color: #111;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 15px;
      font-weight: 400;
      color: #555;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .back-btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 99px;
      border: 1.5px solid #111;
      color: #111;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Pretendard Variable', sans-serif;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .back-btn:active {
      background: #111;
      color: #fff;
    }
